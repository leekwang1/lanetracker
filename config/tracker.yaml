# [1. 추적]
# 한 스텝마다 앞으로 전진하는 거리
forward_distance_m: 0.3
# 전체 실행에서 허용할 최대 추적 거리
max_track_length_m: 120.0
# 관측이 끊겨도 버틸 최대 갭 거리
max_gap_distance_m: 2.4

# [2. 탐색 영역]
# 앞쪽으로 보는 ROI 길이
roi_forward_m: 3.0
# 뒤쪽으로 포함하는 ROI 길이
roi_backward_m: 0.4
# 좌우로 보는 ROI 반폭
roi_lateral_half_m: 0.9
# 같은 차선으로 보는 선호 복도 반폭
corridor_half_width_m: 0.18

# [3. 그리드]
# 로컬 BEV 그리드 셀 크기
grid_cell_size_m: 0.05
# 활성 셀로 인정할 최소 정규화 강도
active_intensity_min: 0.45
# 활성 셀로 인정할 최소 포인트 수
min_points_per_cell: 1
# 후보 ridge가 가져야 하는 최소 셀 수
component_min_cells: 4
# 후보 ridge가 가져야 하는 최소 진행 길이
component_min_span_m: 0.35

# [4. 후보]
# 오버레이와 프로파일에 쓰는 차선 폭
stripe_width_m: 0.14
# 후보 점수의 횡방향 오차 스케일
candidate_lateral_sigma_m: 0.08
# 후보 점수의 방향 오차 스케일
candidate_heading_sigma_deg: 12.0
# 후보를 채택할 최소 점수
candidate_min_score: 0.72

# [5. 진행 방향]
# 이전 방향과 새 방향을 섞는 비율
heading_smoothing_alpha: 0.35
# 한 스텝에서 허용할 최대 방향 변화
max_heading_change_deg: 8.0

# [6. 높이]
# 추적 차선 주변 높이만 남길지 여부
use_z_clip: true
# 로컬 Z 클립에 쓰는 높이 반범위
z_clip_half_range_m: 0.3
